name: Publish packages

# Changesets flow: a push to main with pending changesets opens (or updates) a
# "Version Packages" PR; merging that PR publishes the bumped @validation-os/*
# packages to npm.
#
# Publishing uses npm Trusted Publishing (OIDC): GitHub proves this workflow's
# identity to npm, so no long-lived npm token is stored anywhere. Provenance is
# stamped automatically. Requires a Trusted Publisher (repo bfish1996/validation-os,
# workflow publish.yml) configured on npm for each @validation-os/* package.
on:
  push:
    branches: [main]

concurrency: publish-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC: mint the token npm exchanges for publish rights

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing needs npm >= 11.5.1; Node 20 ships an older npm.
      # Pinned (not @latest) so a future npm release can't silently change the
      # OIDC/provenance behaviour this workflow depends on.
      - run: npm install -g npm@^11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
