# Validation-OS configuration
#
# Copy this file to the root of your workspace (the directory you run your
# agent from, or any parent of it — skills walk up from the working directory
# to find it). If no config file exists, skills fall back to the local-files
# connector with a ./registry directory and web-only evidence.

# Where your registry lives. One of: local-files | notion | sql | nosql
# Each connector is documented in connectors/<name>.md, with a schema guide
# in connectors/<name>-schema.md that /setup-validation-os builds and
# validates against.
connector: local-files

# local-files connector: path to the registry directory (relative to this file).
local_files:
  registry_dir: registry

# notion connector: your own database IDs (see connectors/notion.md for how
# to create the databases and find these IDs). Decisions & Terminology share
# one database, split by a Type select.
# notion:
#   assumptions_db: ""
#   experiments_db: ""
#   decisions_db: ""

# sql connector: a harness-provided database connection (credentials live in
# the harness, never here) plus schema and table names.
# sql:
#   connection_name: ""
#   schema: validation_os
#   assumptions_table: assumptions
#   experiments_table: experiments
#   decisions_table: decisions

# nosql connector: a harness-provided document-store connection plus database
# and collection names.
# nosql:
#   connection_name: ""
#   database: validation_os
#   assumptions_collection: assumptions
#   experiments_collection: experiments
#   decisions_collection: decisions

# Your vocabulary (see skills/_shared/registry-schema.md). Lens = the
# audiences whose decisions assumptions drive; Area = the product/domain
# areas that tag decisions and terminology.
vocabulary:
  lens: [Commercial, Consumer, Investor]
  area: [Product, Go-to-market, Business model, Technology]
  # Audiences your outputs are written for — used by the terminology check.
  audiences: [End user, Investor, Partner, Internal]

# Optional: where prototype briefs and fake-door specs land — a repo
# ("github.com/you/prototypes") or a local directory. /experiment-design
# asks once if it's needed and unset.
# prototype_home: ""

# Optional: /self-review — PRIVATE self-evaluations of how you communicate
# on recorded calls. Local-only directory (relative to this file); never
# synced through the connector. Keep it out of shared version control — the
# skill offers to gitignore it on first run.
# self_review:
#   review_dir: self-review

# Evidence sources available to /find-evidence and /meeting-prep.
# Skills only sweep what is listed here; with nothing listed they still work
# via web/desk research and by asking you to paste notes or transcripts.
# Known sources: web, fireflies, slack, gmail, attio
evidence_sources:
  - web
