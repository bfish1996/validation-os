# Canonical machine-readable ontology for the Validation-OS registry.
#
# This is the checkable shadow of `registry-schema.md` (field semantics) and
# the `*-guardrails.md` files (operational rules). Prose stays the human
# source of meaning; this file is the single machine source for:
# entity/property/relation completeness, select-option legality, status
# transitions, derived views, derivation formulas, and cross-register
# integrity rules.
#
# Who reads it:
# - Connector schema guides (`connectors/*-schema.md`) must map every entity,
#   property, and relation listed here onto their backend — a guide missing
#   any is incomplete (`connectors/SPEC.md`). `options_source: registry-schema`
#   in guide frontmatter resolves to `vocabularies:` here.
# - `/setup-validation-os` checks schema-guide completeness against this file
#   before automated setup.
# - `/assumptions` (audit + loop, via `register-audit.md`), `/goals` (audit),
#   and `/decisions` (Audit) run the `integrity_rules:` whose `surfaced_by`
#   names them.
#
# Six registers: assumptions, experiments (the plan, with composed bar lines),
# readings (the Confidence atom), goals (the commitment container), decisions,
# glossary.
#
# Changing this file is a schema change: update `registry-schema.md` prose and
# every connector schema guide in the same commit — they must never disagree.

version: 1

# ─────────────────────────────────────────────────────────────────────────────
# Vocabularies — every select option that is legal to write.
# ─────────────────────────────────────────────────────────────────────────────
vocabularies:
  # Workspace-defined lists — set by /setup-validation-os, read from
  # validation-os.config.yaml. Never enumerated here.
  lens: { source: config, key: vocabulary.lens }
  area: { source: config, key: vocabulary.area }
  audiences: { source: config, key: vocabulary.audiences }

  # Canonical fixed lists. Values are exact strings; writing a value not
  # listed is illegal (integrity rule `illegal-select-value`). Adding a value
  # is a gated schema change.
  # Small on purpose: there is no Validated status, and queue membership,
  # Testing, goal linkage, and mootness are derived views (derived_views:),
  # never stored values (docs/validated.md).
  assumption_status: [Draft, Live, Invalidated]
  gaps:
    [5 Whys, Metric for truth, Scoring justification, Non-atomic,
     Unfalsifiable, Hyperbole, Lens check, Duplicate, Contradiction,
     Human review]

  # Experiment (the plan) lifecycle + why it closed.
  experiment_status: [Running, Closed]
  experiment_closure_reason: [Completed, Early-stop, Kill]

  # Reading (the evidence atom): the sign of the evidence, set at logging.
  # No `Running` — a reading exists only once observed (registry-schema.md
  # §Field map — Readings).
  reading_result: [Validated, Invalidated, Inconclusive]

  # Bar-line closure verdict — a per-belief REPORT judged against the full
  # pre-registered N, never a Confidence input (readings carry the value).
  bar_verdict: [Validated, Invalidated, Inconclusive]

  # Goal (the commitment container) lifecycle + terminal outcome. Outcome is
  # null until Status = Closed.
  goal_status: [Draft, Active, Closed]
  goal_outcome: [Achieved, Missed, Dropped]

  # Magnitude bands for Goal-rung readings — picked from the absolute outcome
  # against the Goal's ## Pre-registration anchors, never %-of-target.
  magnitude_band: [Low, Typical, High]

  # Source quality is a number, not a select: Representativeness × Credibility,
  # each picked from {1.0, 0.7, 0.5} (experiment-guardrails.md §2). Legal
  # stored values are the five product anchors (0.49 rounds to 0.5). Lives on
  # the Reading.
  source_quality:
    picks: [1.0, 0.7, 0.5]
    anchors: [0.25, 0.35, 0.5, 0.7, 1.0]
  feasibility: [High, Medium, Low]

  # Decision and Glossary are two separate registers (no shared Type select).
  # Their status vocabularies diverge: a term is superseded, never reversed.
  decision_status: [Active, Provisional, Superseded, Reversed]
  glossary_status: [Active, Provisional, Superseded]
  reversibility: [Two-way door, One-way door]

  # The 8-rung activity-and-strength ladder (experiment-guardrails.md §2,
  # docs/evidence-ladder.md). Order = strength, weakest first. Two categories:
  # Testing (recruited-sample instruments, plateau ±30) and Goals (open-world
  # targets, two pre-registered bars). Lives on the Reading (`Rung`) and on the
  # bar line (`Planned rung`). `anchor` feeds the Strength derivation (signed
  # by Result); Goal rungs carry magnitude bands (Low/Typical/High).
  rung:
    - { value: Opinion,             category: Testing, anchor: 3 }
    - { value: Pitch-deck reaction, category: Testing, anchor: 6 }
    - { value: Anecdotal,           category: Testing, anchor: 10 }
    - { value: Desk research,       category: Testing, anchor: 15 }
    - { value: Survey at scale,     category: Testing, anchor: 25 }
    - { value: Prototype usage,     category: Testing, anchor: 30 }
    - { value: Signed intent,       category: Goals,   anchor: { Low: 55, Typical: 68, High: 80 } }
    - { value: Paying users,        category: Goals,   anchor: { Low: 75, Typical: 88, High: 99 } }

  # Theme is an example set, not fixed — workspaces may extend it.
  theme:
    fixed: false
    example:
      [Go-to-market, Product, UX, Business model, Technology, Regulatory,
       Market & competition, Trust & data]

# ─────────────────────────────────────────────────────────────────────────────
# Derivations — computed fields. Never hand-written, in any backend
# (connectors/SPEC.md). Backends without native formulas have the skill
# recompute these on every touching write.
# ─────────────────────────────────────────────────────────────────────────────
derivations:
  derived_impact:
    field: assumptions.Derived Impact
    formula: >-
      seed + (100 - seed) × S / (S + 100), where seed = the hand-scored
      Impact and S = Σ Derived Impact of assumptions whose Depends on names
      this row, + 100 per standing decision (Provisional/Active) naming it
      via Based on assumption. Goals never contribute — a goal never touches
      Impact (docs/goals.md). One reverse-topological pass (dependents
      first); moot rows pin to 0 and contribute nothing. Written by the
      weekly recompute script — stale between runs by design
      (assumption-guardrails.md §3).
    range: [0, 100]
  risk:
    field: assumptions.Risk
    formula: "Derived Impact * (1 - max(0, Confidence) / 100)"
    # Full-precision sort, rounded display/storage rounds last.
    range: [0, 100]
  confidence:
    field: assumptions.Confidence
    formula: >-
      (w0·0 + Σ wi·si) / (w0 + Σ wi), w0 = 100 (hard floor ≥ 98),
      wi = |si| × Source quality, si = the reading's signed Strength. Only
      concluded Validated/Invalidated Readings enter; Readings sharing a
      source against one belief dedupe to the strongest (largest |si|, most
      recent on ties). No corroboration bump. ≤ -50 = kill zone: audit
      prompts a human kill verdict, never an auto-flip
      (experiment-guardrails.md §2).
    range: [-100, 100]
  strength:
    field: readings.Strength
    formula: >-
      rung anchor (Goal rungs: × magnitude band, Low/Typical/High from the
      absolute outcome) × sign(Result) — Validated positive, Invalidated
      negative; 0 unless Result is Validated or Invalidated. Goal-rung sign
      reads the goal's two pre-registered bars: hit/beat We're right if →
      positive, at/below We're wrong if → negative, between → interpolated.
    rung_anchor: vocabularies.rung[].anchor
    range: [-99, 99]

# ─────────────────────────────────────────────────────────────────────────────
# Entities — the record types and their properties. `hand_scored: true` marks
# the only numbers a human types. Body headings are verbatim names; the
# heading *level* is connector-specific (local files nest them one level under
# the record heading). `composed_into` marks a sub-structure realized inside
# its parent record backend-natively, not a register of its own.
# ─────────────────────────────────────────────────────────────────────────────
entities:
  assumptions:
    description: Every belief the business depends on, as a falsifiable sentence, ranked by Risk.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Description, type: text, required: true }
      - { name: Lens, type: select, options: vocabularies.lens, required: true }
      - { name: Theme, type: multi_select, options: vocabularies.theme }
      - { name: Impact, type: number, range: [0, 100], hand_scored: true }
      - { name: Derived Impact, type: number, derived: derivations.derived_impact }
      - { name: Risk, type: number, derived: derivations.risk }
      - { name: Confidence, type: number, derived: derivations.confidence }
      - { name: Status, type: select, options: vocabularies.assumption_status,
          machine: status_machines.assumption_status }
      - { name: Owner, type: person }
      - { name: Gaps, type: multi_select, options: vocabularies.gaps }
    body_headings: [5 Whys, Metric for truth, Scoring justification, Provenance & notes]

  experiments:
    description: One row per designed test PLAN. Carries no rung and no strength — those live on the Readings the run produces. Bundles one-or-more beliefs through composed bar lines.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Instrument, type: link, required: true }   # interview or dataset only
      - { name: Feasibility, type: select, options: vocabularies.feasibility }
      - { name: Status, type: select, options: vocabularies.experiment_status,
          machine: status_machines.experiment_status }
      - { name: Closure reason, type: select, options: vocabularies.experiment_closure_reason, required: false }
      - { name: Owner, type: person }
      - { name: Date, type: date }
    body_headings: [Method protocol, Closure rollup]

  bar_line:
    description: >-
      The per-belief pre-registration on an Experiment — an
      association-with-attributes between one Experiment and one Assumption,
      written before any Reading exists. NOT a register: each bar line belongs
      to exactly one Experiment and is realized backend-natively (child table /
      embedded array / nested block; see connector guides). The closure
      bar verdict is a report, never a Confidence input.
    composed_into: experiments
    references: assumptions   # one assumption per bar line
    properties:
      - { name: We're right if, type: text, required: true }
      - { name: We're wrong if, type: text, required: false }   # no kill bar is legal
      - { name: Planned rung, type: select, options: vocabularies.rung }
      - { name: Bar verdict, type: select, options: vocabularies.bar_verdict, required: false }

  readings:
    description: One artifact × one belief — the atomic unit Confidence reads. Exists only once observed (no draft/running state). Origin (Experiment | Goal | none) lives here, never on the assumption.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Source, type: link, required: true }   # first-class independence-dedupe key
      - { name: Rung, type: select, options: vocabularies.rung, required: true }
      - { name: Representativeness, type: select, options: vocabularies.source_quality.picks, required: true }
      - { name: Credibility, type: select, options: vocabularies.source_quality.picks, required: true }
      - { name: Source quality, type: number, derived: true }   # = Representativeness × Credibility
      - { name: Result, type: select, options: vocabularies.reading_result,
          machine: status_machines.reading_result, required: true }
      - { name: Strength, type: number, derived: derivations.strength }
      - { name: Date, type: date }
      - { name: Owner, type: person, required: false }
    body_headings: [Grading, Notes]

  goals:
    description: The Goals-side evidence container — pre-registration (two bars, deadline, instrument); closing it emits per-belief Readings. One goal-level bar pair, decomposed per belief only at close (docs/goals.md).
    properties:
      - { name: Title, type: title, required: true }
      - { name: We're right if, type: text, required: true }
      - { name: We're wrong if, type: text, required: false }   # no floor → no negative reading
      - { name: Instrument, type: text, required: true }   # CRM stage / analytics cohort / payment event
      - { name: Deadline, type: date }
      - { name: Owner, type: person }
      - { name: Status, type: select, options: vocabularies.goal_status,
          machine: status_machines.goal_status }
      - { name: Outcome, type: select, options: vocabularies.goal_outcome, required: false }
      - { name: Date, type: date }
    body_headings: [Pre-registration, Rationale, Closure]
    # No Rung field — rung lands on the Reading at close, guardrail-enforced.

  decisions:
    description: The decision log. A row here IS a decision (the register is the discriminator — no Type field). No Kind field.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Status, type: select, options: vocabularies.decision_status,
          machine: status_machines.decision_status }
      - { name: Area, type: select, options: vocabularies.area }
      - { name: Owner, type: person }
      - { name: Agreed by, type: people }
      - { name: Unanimity score, type: number, range: [0, 100], hand_scored: true }
      - { name: Source, type: text }
      - { name: Decided date, type: date }
      - { name: Reversibility, type: select, options: vocabularies.reversibility }
    body_headings: [Decision, Rationale, Alternatives considered, Source]

  glossary:
    description: The shared glossary (the ubiquitous-language discipline; only the register is "Glossary"). No Type field; Status has no Reversed.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Status, type: select, options: vocabularies.glossary_status,
          machine: status_machines.glossary_status }
      - { name: Area, type: select, options: vocabularies.area }
    # Verbatim names the terminology check keys off (ubiquitous-language.md).
    body_headings: [Definition, Avoid / don't say, How it differs]

# ─────────────────────────────────────────────────────────────────────────────
# Relations — the edges between records. `kind: symmetric` means one relation
# set identically on both rows; `kind: directed` has a forward name and an
# inverse. On backends that don't auto-sync, both ends are written explicitly
# (integrity rule `two-way-relation-one-ended`). A Reading's `Source` is a
# link PROPERTY to an artifact home, not a register relation — the artifact is
# never a record (OPS-1183: reference, never mirror).
# ─────────────────────────────────────────────────────────────────────────────
relations:
  - name: Depends on / Enables
    kind: directed
    forward: Depends on
    inverse: Enables
    source: assumptions
    target: assumptions
    cardinality: many-to-many
    meaning: The dependency DAG built by 5-Whys closure. Cycles are forbidden — A→…→A means the two nodes are the same assumption; merge.

  - name: Contradicts
    kind: symmetric
    source: assumptions
    target: assumptions
    cardinality: many-to-many
    meaning: Two distinct claims in tension that can't both hold. Pairs with the Contradiction gap and a provenance note naming the resolving experiment. Never for negation-duplicates — those merge (assumption-guardrails.md §4).

  - name: Assumption / Readings
    kind: directed
    forward: Assumption          # on the reading row (exactly one)
    inverse: Readings            # on the assumption row
    source: readings
    target: assumptions
    cardinality: many-to-one
    meaning: >-
      The concluded Readings scored against a belief — EVERY Confidence input,
      whatever the origin. Replaces the old Assumption / Experiments relation;
      the assumption never links an Experiment directly.

  - name: Reading / Experiment
    kind: directed
    forward: Experiment          # on the reading row, nullable
    inverse: Readings            # queried on the experiment, not stored
    source: readings
    target: experiments
    cardinality: many-to-one
    nullable: true
    meaning: The originating plan, as provenance. Null for goal and bare/found readings. Exactly one of {Experiment, Goal} is set, or neither (integrity rule reading-two-origins).

  - name: Reading / Goal
    kind: directed
    forward: Goal                # on the reading row, nullable
    inverse: Readings            # queried on the goal, not stored
    source: readings
    target: goals
    cardinality: many-to-one
    nullable: true
    meaning: The originating goal container. Null for experiment and bare readings. Exactly one of {Experiment, Goal} is set, or neither (integrity rule reading-two-origins).

# The Experiment↔belief link is NOT a top-level relation: it is the composed
# `bar_line` sub-structure (entities.bar_line, references: assumptions), realized
# backend-natively inside each Experiment. "Which experiments test this belief"
# (derived_views.experiments_testing_me) reads those composed bar lines.

  - name: Related tension
    kind: symmetric
    source: decisions
    target: decisions
    cardinality: many-to-many
    meaning: "Decision↔Decision: unresolved contradiction — actionability inferred from each row's Status (decision-guardrails.md §4). Resolved via Supersedes."

  - name: Related tension
    kind: symmetric
    source: glossary
    target: glossary
    cardinality: many-to-many
    meaning: "Glossary↔Glossary: confusable-neighbour pairing (informational; pairs with the ## How it differs bullets)."

  - name: Supersedes / Superseded by
    kind: directed
    forward: Supersedes
    inverse: Superseded by
    source: decisions
    target: decisions
    cardinality: many-to-many
    meaning: Resolved, intentional override; the superseded row's Status flips to Superseded. Distinct from Related tension (unresolved) — never both for the same counterpart at once.

  - name: Supersedes / Superseded by
    kind: directed
    forward: Supersedes
    inverse: Superseded by
    source: goals
    target: goals
    cardinality: many-to-many
    meaning: Re-cut supersedes the prior goal; the superseded goal goes Closed / Dropped and emits no reading (docs/goals.md).

  - name: Based on assumption
    kind: directed
    forward: Based on assumption
    source: decisions
    target: assumptions
    cardinality: many-to-many
    side_effects: >-
      None — this edge never touches the assumption's Status, and it feeds
      Derived Impact only as a standing-decision node (+100 in S), never the
      seed.
    meaning: >-
      Why we decided this (decision-guardrails.md §6). Decision rows only.
      Distinct from the Goal's same-named relation, which read backwards is the
      goal linkage (derived_views.goal_linked) — a per-goal view that never
      touches Impact.

  - name: Based on assumption
    kind: directed
    forward: Based on assumption
    source: goals
    target: assumptions
    cardinality: many-to-many
    side_effects: >-
      None — a goal NEVER touches Impact, Confidence, or queue membership.
    meaning: >-
      The beliefs the goal is bet on. Read backwards it is the goal linkage
      (derived_views.goal_linked) — a per-goal queue view only (docs/goals.md).

  - name: Resolves assumption
    kind: directed
    forward: Resolves assumption
    source: decisions
    target: assumptions
    cardinality: many-to-many
    side_effects: >-
      Lowers the target's Impact to 0 (moot), gated and human-affirmed: a
      dated line in the assumption's ## Scoring justification records the
      prior Impact and cites this decision; reversal restores it
      (decision-guardrails.md §8). Never touches Status — closure is reserved
      for true invalidation (docs/validated.md).
    meaning: This decision retires the open question without a test by making it moot — the paths it mattered on are foreclosed. Separate relation from Based on assumption — never inferred from it (decision-guardrails.md §6).

# ─────────────────────────────────────────────────────────────────────────────
# Status machines — every legal transition, who may perform it, and the gate.
# Anything not listed is an illegal write. Prose flow: registry-schema.md.
# ─────────────────────────────────────────────────────────────────────────────
status_machines:
  assumption_status:
    initial: Draft
    transitions:
      - { from: Draft, to: Live,
          by: "/assumptions (single|seed)", gate: gated,
          trigger: "grill close-out: the last Gaps tag (including Human review) clears in a gated session" }
      - { from: Live, to: Draft,
          by: "/assumptions (gated session)", gate: gated,
          trigger: "a new gap lands on the row — audit finding, contradiction, staleness flag" }
      - { from: Live, to: Invalidated,
          by: "evidence skills + human verdict", gate: gated,
          trigger: "the evidence turns decisively against the belief — signed Confidence in the kill zone (≤ -50, reachable only by a series of missed Goal-rung readings) — and a human affirms the kill" }
      - { from: Invalidated, to: Live,
          by: "gated reopen session", gate: gated,
          trigger: "the killing reading is re-judged flawed, or the world has changed enough that the kill no longer holds — human re-verdict" }
    forbidden:
      - There is no Validated status. Validation is only ever Confidence rising and Risk falling — "validated at <rung>" is prose, never a stored state (docs/validated.md).
      - Draft ⇔ Gaps non-empty, always (integrity rule draft-live-gaps-invariant). Batch/loop modes tag the Human review gap — which keeps or returns the row to Draft — and never flip Status directly.
      - Logging a Reading never flips Status (Confidence-only). Only a human-affirmed kill does.
      - Testing, queue membership, goal linkage, and mootness are derived views (derived_views:), never stored.

  experiment_status:
    initial: Running
    transitions:
      - { from: Running, to: Closed,
          by: "/find-evidence close-out or human conclusion", gate: gated,
          trigger: "the run ends — a Closure reason (Completed / Early-stop / Kill) is set and each bar line takes its Bar verdict" }
    forbidden:
      - A Closed experiment is never reverted to Running.
      - The plan carries no rung and no strength — those are on the Readings it produced.

  reading_result:
    initial: "conclusive at logging (Validated | Invalidated | Inconclusive)"
    transitions: []   # set once at logging; a reading has no Running state
    forbidden:
      - No Running — a reading exists only once observed (registry-schema.md §Field map — Readings).
      - Strength must be 0 while Result is Inconclusive (integrity rule strength-not-gated).

  goal_status:
    initial: Draft
    transitions:
      - { from: Draft, to: Active, by: "/goals", gate: gated,
          trigger: "the commitment is made — bars and instrument fixed" }
      - { from: Active, to: Closed, by: "/goals", gate: gated,
          trigger: "the deadline is judged — Outcome (Achieved/Missed/Dropped) set; Achieved/Missed decompose into per-belief Readings" }
    forbidden:
      - Outcome is null until Closed.
      - Re-cut is a Supersedes edge to a fresh Goal, not an edit of a committed bar.

  decision_status:
    initial: "Active (agreed) | Provisional (still forming)"
    transitions:
      - { from: Provisional, to: Active, by: "/decisions", gate: gated }
      - { from: [Active, Provisional], to: Superseded,
          by: "/decisions", gate: gated,
          trigger: "a later decision overrides it — always paired with a Supersedes edge" }
      - { from: [Active, Provisional], to: Reversed,
          by: "/decisions", gate: gated,
          trigger: "abandoned outright, no successor" }

  glossary_status:
    initial: "Active (agreed) | Provisional (still forming)"
    transitions:
      - { from: Provisional, to: Active, by: "/decisions", gate: gated }
      - { from: [Active, Provisional], to: Superseded,
          by: "/decisions", gate: gated,
          trigger: "a better term replaces it — flag-if-used thereafter" }
    forbidden:
      - No Reversed — a term is superseded by a better one, never reversed.

# ─────────────────────────────────────────────────────────────────────────────
# Derived views — assumption states read from data, never stored. Boards and
# filters may display them; no field carries them (registry-schema.md §Status
# & derived views). The working Risk threshold is a prioritisation setting,
# not a record property.
# ─────────────────────────────────────────────────────────────────────────────
derived_views:
  goal_linked: >-
    A standing (Draft/Active) Goal record links the row via Based on
    assumption. A per-goal queue view ONLY — never an Impact anchor (a goal
    is not a node in derived_impact), never a condition of test-next
    membership, never a Confidence input (docs/goals.md).
  experiments_testing_me: >-
    The Experiments whose composed bar lines name this belief — read over the
    experiments' bar lines (each bar_line references one assumption), never a
    stored relation on the assumption. Feeds Testing and the test-next surface.
  testing: "Status = Live AND a linked Experiment (plan) has Status = Running with an open bar line on this belief."
  test_next_surface: >-
    Experiments, not assumptions — there is no Risk-ranked belief queue.
    Candidate/designed experiments on Live rows, ranked by Feasibility × the
    linked assumption's Risk; tie-break = most-negative linked signed
    Confidence first. Goal-agnostic: every Live row is eligible on its own
    merits, linked or not (docs/goals.md). The exact ruleset and top-N cut
    are the experiment-prioritisation layer's.
  kill_lane: >-
    Status = Live AND Confidence ≤ -50 — surfaced for a human kill verdict
    (integrity rule kill-zone-unreviewed), out of the test-next surface.
  proven_set: >-
    Status = Live AND the strongest (largest |Strength|) concluded linked
    Reading is Validated — "what we currently know"; provisional, always
    (docs/validated.md).
  moot: >-
    Seed Impact = 0 via a standing decision's Resolves assumption action —
    Derived Impact pins to 0, drops out of every ranking; reversal restores
    the prior Impact.

# ─────────────────────────────────────────────────────────────────────────────
# Integrity rules — derivable defects no single-record grill can see. Each is
# a named check: audits detect (read-only), fixes stay gated. `surfaced_by`
# names the workflow that owns detection. severity: error = always a finding;
# warn = flag for human judgment.
# ─────────────────────────────────────────────────────────────────────────────
integrity_rules:
  # Structural (any register)
  - id: dangling-reference
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A relation value resolves to no record.
  - id: illegal-select-value
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit", validate_backend]
    check: A select field carries a value not in its vocabulary (fixed lists above; config lists for Lens/Area).
  - id: body-template-missing-heading
    severity: warn
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A record is missing one of its type's verbatim body_headings. A Glossary row without "Avoid / don't say", or a Reading without "Grading", silently escapes its check — always flag it.
  - id: two-way-relation-one-ended
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A symmetric or inverse relation written on one end only, on a backend that doesn't auto-sync.
  - id: reading-two-origins
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: A Reading with both its Experiment and Goal links set — a reading has exactly one container origin, or none (bare). Sets neither is legal; sets both is not.

  # Derived-field discipline
  - id: derived-field-stale
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: >-
      Stored Confidence/Risk (assumptions) or Strength/Source quality
      (readings) differs from recomputing its derivation (formula-less
      backends). Derived Impact is exempt between weekly recompute runs — it is
      stale by design; flag only a value no run could have produced (below
      seed, or > 100).
  - id: strength-not-gated
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: A Reading's Strength ≠ 0 while its Result is Inconclusive.
  - id: reading-ungraded
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      A concluded Validated/Invalidated Reading whose body lacks the ##
      Grading block — rung + (Goal rungs) magnitude anchor + Representativeness
      × Credibility picks with one-line justifications + the source the
      independence dedupe keys off (experiment-guardrails.md §2). An ungraded
      reading's weight can't be audited.
  - id: goal-rung-no-floor
    severity: error
    surfaced_by: ["/assumptions audit", "/goals audit"]
    check: >-
      A Goal-rung (Signed intent / Paying users) Reading concluded Invalidated
      whose originating Goal has no pre-registered We're wrong if bar — no
      floor, no negative: an uncontrolled absence of the outcome is
      Inconclusive (experiment-guardrails.md §2).
  - id: stale-representativeness
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      The ICP/Lens definition changed after a Reading's Representativeness
      was graded — the stored Source quality reads a retired ICP and the
      recompute silently uses it. Flag every reading graded under the old
      definition for re-grade (experiment-guardrails.md §2).

  # Graph health (assumptions)
  - id: dependency-cycle
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: A Depends on cycle (A→…→A) — the nodes are the same assumption; merge (assumption-guardrails.md §2).
  - id: orphan-assumption
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: No Depends on and no Enables — does this connect to the thesis at all? (assumption-guardrails.md §5)
  - id: contradiction-unwired
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: Contradiction gap without a Contradicts edge, or an edge without the gap + a provenance note naming the resolving experiment.
  - id: direct-contradiction-unmerged
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: Two records asserting opposite truth values of the same proposition — a negation-duplicate; merge (assumption-guardrails.md §4a).

  # Status coherence (assumptions × readings)
  - id: draft-live-gaps-invariant
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: Status = Draft with empty Gaps, or Status = Live with non-empty Gaps — the Draft ⇔ Gaps invariant is broken; fix in a gated session.
  - id: unrolled-verdict
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: A concluded Invalidated Reading was never folded into the linked assumption's stored Confidence (the score predates the verdict) — the miss was never rolled up; recompute, and if the result lands in the kill zone, flag for a gated close-out (human verdict).
  - id: moot-without-resolver
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: Impact = 0 with a mootness line citing a resolving decision that is no longer standing (Reversed/Superseded, successor doesn't re-resolve) — restore the prior Impact per decision-guardrails.md §8.
  - id: goal-link-uncited
    severity: warn
    surfaced_by: ["/goals audit"]
    check: A Goal record's Based on assumption link whose target assumption is not named anywhere in the goal's rationale prose — a relation with no reasoning behind it. A hygiene check only — goals don't touch Impact and the queue gate is retired, so an uncited link unlocks nothing; it is just noise in the per-goal view and unaudited rationale (docs/goals.md).

  # Propagation (cross-register — a verdict in one place invalidates state in another)
  - id: invalidated-dependency
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: An assumption whose Depends on target is Invalidated while it is itself Live with high Confidence — its support rests on a broken foundation; propose the Human review gap.
  - id: contradicts-both-validated
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: Both ends of a Contradicts edge sit at solidly positive Confidence (strongest concluded Reading Validated on each) — the tension the edge marks was never real, or one verdict is wrong.
  - id: stale-rationale
    severity: warn                # error when the decision is a One-way door
    surfaced_by: ["/decisions audit"]
    check: A standing (Active) decision whose Based on assumption link points at a now-Invalidated assumption — the rationale is stale; re-affirm or revisit.
  - id: stale-resolution
    severity: error
    surfaced_by: ["/decisions audit"]
    check: A Reversed/Superseded decision whose Resolves assumption targets still sit moot at Impact 0 (and the successor doesn't re-resolve them) — decision-guardrails.md §8.
  - id: one-way-door-untested-basis
    severity: error
    surfaced_by: ["/decisions audit"]
    check: A One-way door decision Based on an assumption whose Risk sits above the working threshold, with no risk-acceptance line in ## Rationale — decision-guardrails.md §8.
  - id: unresolved-tension
    severity: warn
    surfaced_by: ["/decisions audit"]
    check: A Decision↔Decision Related tension pair with both sides still Active — a human must resolve or confirm coexistence (decision-guardrails.md §4).
  - id: supersedes-tension-overlap
    severity: error
    surfaced_by: ["/decisions audit"]
    check: The same counterpart wired in both Related tension and Supersedes — once Supersedes is set, the tension is resolved (decision-guardrails.md §5).

  # Goal records (docs/goals.md — goals are instruments, never gates, so every
  # rule here surfaces or chases; none blocks a human from committing.)
  - id: overdue-risk-acceptance
    severity: error
    surfaced_by: ["/goals audit"]
    check: An Active Goal record with a risk-acceptance line past its "revisit by" date whose assumption is still untested (format — decision-guardrails.md §8).
  - id: goal-band-unaccepted
    severity: warn
    surfaced_by: ["/goals audit"]
    check: An Active Goal record with a linked belief whose Confidence sits below the ready band and no dated risk-acceptance line naming it — the gamble was taken without being written down. Advisory at draft time, chased once Active (docs/goals.md §In).
  - id: goal-tripwire-unreviewed
    severity: warn
    surfaced_by: ["/goals audit"]
    check: A Draft/Active Goal record resting on a belief that took a conclusive verdict after the goal was drafted, with no subsequent re-cut, risk-acceptance, or affirmation — the mid-cycle tripwire fired and nobody answered it (docs/goals.md §Out).
  - id: unclosed-goal
    severity: warn
    surfaced_by: ["/goals audit"]
    check: An Active Goal record past its deadline that has not been Closed.
  - id: ungated-outcome
    severity: error
    surfaced_by: ["/goals audit"]
    check: A Goal record Closed as Achieved/Missed whose outcome was never decomposed — no per-belief Reading against any linked assumption. The outcome IS the evidence; closing without reading it back is the one thing the joint exists to prevent. Dropped is exempt, emitting no evidence.
  - id: stale-goal-anchor
    severity: warn
    surfaced_by: ["/assumptions audit", "/goals audit"]
    check: >-
      An assumption whose hand-scored seed justification leans on a goal or
      decision ("scored high because the Q3 goal rests on it") — the seed
      must be purely intrinsic. A standing decision's weight is the
      propagation's job (S) and dies with the link; a goal never touches
      Impact at all (assumption-guardrails.md §3). Re-justify the seed on
      severity alone. (Derived Impact needs no staleness check: a dead
      decision link's push vanishes at the next recompute.)
  - id: anchor-dilution
    severity: warn                # lens health only — linkage no longer gates anything
    surfaced_by: ["/goals audit"]
    check: Report the count of standing (Draft+Active) Goal records and the share of open assumptions linked to one; when most open assumptions link to some goal, the per-goal view has stopped discriminating. Informational — a goal touches neither Impact nor queue membership, so this dilutes a lens, not prioritisation (docs/goals.md §Through).
