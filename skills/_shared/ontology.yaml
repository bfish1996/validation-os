# Canonical machine-readable ontology for the Validation-OS registry.
#
# This is the checkable shadow of `registry-schema.md` (field semantics) and
# the `*-guardrails.md` files (operational rules). Prose stays the human
# source of meaning; this file is the single machine source for:
# entity/property/relation completeness, select-option legality, status
# transitions, derived views, derivation formulas, and cross-register
# integrity rules.
#
# Who reads it:
# - Connector schema guides (`connectors/*-schema.md`) must map every entity,
#   property, and relation listed here onto their backend — a guide missing
#   any is incomplete (`connectors/SPEC.md`). `options_source: registry-schema`
#   in guide frontmatter resolves to `vocabularies:` here.
# - `/setup-validation-os` checks schema-guide completeness against this file
#   before automated setup.
# - `/assumptions` (audit + loop, via `register-audit.md`), `/find-evidence`
#   (evidence-plan audit), and `/decisions` (Audit) run the `integrity_rules:`
#   whose `surfaced_by` names them.
#
# Five registers: assumptions, experiments (the unified evidence plan, with
# composed bar lines — Testing and Market-grade both live here), readings (the
# Confidence atom), decisions, glossary. The Goal record was unified into the
# Experiment and the `people` collection retired (the evidence-remodel slice).
#
# Changing this file is a schema change: update `registry-schema.md` prose and
# every connector schema guide in the same commit — they must never disagree.

version: 1

# ─────────────────────────────────────────────────────────────────────────────
# Vocabularies — every select option that is legal to write.
# ─────────────────────────────────────────────────────────────────────────────
vocabularies:
  # Workspace-defined lists — set by /setup-validation-os, read from
  # validation-os.config.yaml. Never enumerated here.
  lens: { source: config, key: vocabulary.lens }
  area: { source: config, key: vocabulary.area }
  audiences: { source: config, key: vocabulary.audiences }
  # The auth-sourced team list Owner / Agreed by reference (the evidence-remodel slice). A
  # dashboard user, not a register row — the `people` collection was retired.
  # Sourced from config now (connector auth later); never enumerated here.
  dashboard_user: { source: config, key: vocabulary.dashboard_users }

  # Canonical fixed lists. Values are exact strings; writing a value not
  # listed is illegal (integrity rule `illegal-select-value`). Adding a value
  # is a gated schema change.
  # Small on purpose: there is no Validated status, and queue membership,
  # Testing, and mootness are derived views (derived_views:), never stored
  # values (docs/validated.md).
  assumption_status: [Draft, Live, Invalidated]
  # There is no stored `Gaps` field (the evidence-remodel slice): the audit check-types
  # (Non-atomic, Unfalsifiable, Hyperbole, Lens check, Duplicate, Contradiction)
  # are transient grill stages, not durable tags. Readiness is the derived
  # `Completeness %` (derivations.completeness), computed from structural slot
  # presence, never a stored tag.

  # Experiment (the unified evidence plan) lifecycle + why it closed + terminal
  # outcome. `Draft` is the pre-commit state; commit is the Draft→Running gate;
  # conclude+verdict is the Running→Closed gate. Outcome null until Closed.
  # `Archived` = a Draft/Running plan retired without concluding — shelved out
  # of the active + test-next views, never read back as evidence (distinct from
  # Closed, which concluded against its bars). A reading's experimentId must
  # reference a live (non-archived) experiment (integrity reading-orphaned-experiment).
  experiment_status: [Draft, Running, Closed, Archived]
  experiment_closure_reason: [Completed, Early-stop, Kill]
  experiment_outcome: [Achieved, Missed, Dropped]

  # Reading (the evidence atom): the sign of the evidence, set at logging.
  # No `Running` — a reading exists only once observed (registry-schema.md
  # §Field map — Readings).
  reading_result: [Validated, Invalidated, Inconclusive]

  # Bar-line closure verdict — a per-belief REPORT judged against the full
  # pre-registered N, never a Confidence input (readings carry the value).
  bar_verdict: [Validated, Invalidated, Inconclusive]

  # Magnitude bands for Market-rung readings — picked from the absolute outcome
  # against the experiment bar's pre-registration anchors, never %-of-target.
  magnitude_band: [Low, Typical, High]

  # Source quality is a number, not a select: Representativeness × Credibility,
  # each picked from {1.0, 0.7, 0.5} (experiment-guardrails.md §2). Legal
  # stored values are the five product anchors (0.49 rounds to 0.5). Lives on
  # the Reading.
  source_quality:
    picks: [1.0, 0.7, 0.5]
    anchors: [0.25, 0.35, 0.5, 0.7, 1.0]
  feasibility: [High, Medium, Low]

  # Decision and Glossary are two separate registers (no shared Type select).
  # Their status vocabularies diverge: a term is superseded, never reversed.
  decision_status: [Active, Provisional, Superseded, Reversed]
  glossary_status: [Active, Provisional, Superseded]
  reversibility: [Two-way door, One-way door]

  # The evidence rung vocabulary (the confidence-scoring simplification). A rung is an evidence TYPE on the
  # say→do axis plus operational rungs. Each assumption TYPE defines which rungs
  # are applicable; non-applicable rungs carry anchor 0 (allowed to attach,
  # flagged, never move the bar) and are hidden from the evidence composition
  # UI. Lives ROW-LEVEL on the Reading (`Rung`, one per artifact — 0.10) and on
  # the bar line (`Planned rung`). `anchor` feeds the Strength derivation
  # (signed by Result). The rung vocabulary is fixed; only the anchors vary by
  # assumption type.
  rung:
    - { value: Talk,          category: Testing }
    - { value: Survey,        category: Testing }
    - { value: "Desk & data", category: Testing }
    - { value: Fake-door,     category: Testing }
    - { value: Prototype use, category: Testing }
    - { value: Retention,     category: Testing }
    - { value: Commitment,    category: Market }
    - { value: Payment,       category: Market }
    - { value: Build proof,   category: Operational }
    - { value: Outcome test,  category: Operational }
    - { value: Cost data,     category: Operational }

  # Theme is an example set, not fixed — workspaces may extend it.
  theme:
    fixed: false
    example:
      [Go-to-market, Product, UX, Business model, Technology, Regulatory,
       Market & competition, Trust & data]

  # Risk Group (the confidence-scoring simplification) — the foreground headline axis. Every assumption
  # belongs to exactly one of Desirability · Usability · Feasibility ·
  # Viability. Derived from the Assumption Type, not separately hand-set.
  risk_group: [Desirability, Usability, Feasibility, Viability]

  # Assumption Type (the confidence-scoring simplification) — the evidence key that replaces the retired
  # Question Type. A finer type that decides what evidence graduates this
  # assumption. Set by what would prove the claim false (the gaming guard),
  # inferred at authoring/grilling, surfaced only as a secondary
  # filter/grouping. Each type maps to exactly one Risk Group.
  assumption_type:
    [ProblemExists, ProblemWidespread, WantOurSolution, ItWorks,
     CanCompleteTask, CanBuildIt, LegalCompliant, TheyllPay,
     TheyKeepUsingIt, ReachProfitably, EconomicsWork]

  # Cost-to-test tier (the confidence-scoring simplification) — derived from the type's ceiling-rung nature.
  # Overridable per assumption, since context can bend it.
  cost_tier: [cheap, moderate, expensive]

  # Graduation state (the confidence-scoring simplification) — the progression: Untested → Signal →
  # Graduated. Recomputed on every write; a disconfirming reading can move it
  # backwards.
  graduation_state: [Untested, Signal, Graduated]

  # @deprecated Stage was retired (the confidence-scoring simplification). Its IDEO-triangle meaning is
  # absorbed by Risk Group; its reversibility meaning is dropped. Retained
  # only for migration reading of legacy records.
  stage: [Discovery, Validation, Scale, Maturity]

  # @deprecated Question Type was retired (the confidence-scoring simplification), replaced by
  # Assumption Type. Retained only for migration reading of legacy records.
  question_type:
    [Existence, Prevalence, CausalEffect, WillingnessToPay,
     ValueUtility, Regulatory, Feasibility]

# ─────────────────────────────────────────────────────────────────────────────
# @deprecated Stage-keyed Risk threshold (the confidence-scoring simplification retired). Stage and Risk
# are retired; the graduation bar replaces the stopping rule. Kept for
# migration back-compat only.
# ─────────────────────────────────────────────────────────────────────────────
# risk_threshold_by_stage:
#   Discovery: 30
#   Validation: 15
#   Scale: 10
#   Maturity: 5
# confidence_floor_by_stage:
#   Discovery: 10
#   Validation: 25
#   Scale: 40
#   Maturity: 60

# ─────────────────────────────────────────────────────────────────────────────
# Graduation bar (the confidence-scoring simplification) — the impact-scaled bar an assumption's
# Confidence must reach to graduate. Replaces the stage-keyed Risk threshold.
# bar = base + k × derivedImpact, capped at max. Provisional v1.
# ─────────────────────────────────────────────────────────────────────────────
graduation:
  base: 40
  k: 0.5
  max: 90

# ─────────────────────────────────────────────────────────────────────────────
# Derivations — computed fields. Never hand-written, in any backend
# (connectors/SPEC.md). Backends without native formulas have the skill
# recompute these on every touching write.
# ─────────────────────────────────────────────────────────────────────────────
derivations:
  derived_impact:
    field: assumptions.Derived Impact
    formula: >-
      seed + (100 - seed) × S / (S + 100), where seed = the hand-scored
      Impact (capped at IMPACT_SEED_CAP, the confidence-scoring simplification) and S = Σ Derived Impact of
      assumptions whose Depends on names this row, + 100 per standing decision
      (Provisional/Active) naming it via Based on assumption. A reading's
      container origin (its Experiment) never contributes — only dependent
      assumptions and standing decisions feed S. One reverse-topological pass
      (dependents first); moot rows pin to 0 and contribute nothing.
      Recomputed on every touching write together with Confidence and
      graduation (the derive-on-write invariant) — no deliberate staleness; the batch pass is only
      a backstop for writes that bypass the dashboard
      (assumption-guardrails.md §3).
    range: [0, 100]
  # Risk — live dashboard ranking infrastructure, NOT retired by the
  # confidence-scoring simplification (only Risk Group / the Stage-keyed
  # threshold were). Distinct from the (currently unsurfaced) categorical
  # Risk Group below.
  risk:
    field: assumptions.Risk
    formula: "Derived Impact * (1 - max(0, Confidence) / 100)"
    range: [0, 100]
  confidence:
    field: assumptions.Confidence
    formula: >-
      (Σ wi·si) / (Σ_rung W0[rung] + Σ wi), per-rung W0,
      wi = |si| × Source quality × commitmentFactor, si = the signed Strength
      of a beliefs[] entry scored against this assumption (across all readings).
      commitmentFactor is reading-level: 1.0 when the entry's reading carries an
      experimentId (direct output of concluding a committed Experiment), else
      0.85 (found/bare evidence). Only concluded Validated/Invalidated entries
      enter; entries sharing a source against the same assumption dedupe to the
      strongest (largest |si|, most recent on ties) — dedupe is per
      (belief, source). Market rungs never dedupe. No corroboration bump.
      ≤ -50 = kill zone.
    range: [-100, 100]
    commitment_factor: { experiment_born: 1.0, found: 0.85 }
  strength:
    field: reading_belief.Strength   # per beliefs[] entry, one s per belief scored
    formula: >-
      the READING ROW's Rung anchor from the 3D lookup
      `RUNG_ANCHOR[assumptionType][rung][band]` — keyed by the linked
      ASSUMPTION's Assumption Type, the row's Rung, and the row's Magnitude
      band (Low/Typical/High) — × sign (this entry's Result) — Validated
      positive, Invalidated negative; 0 unless Result is Validated or
      Invalidated. A rung that is non-evidence for the assumption's type
      carries anchor 0 across all bands, so the reading contributes `s=0`
      and is flagged at the UI/skill layer (not a write blocker —
      `isNonEvidence(assumptionType, rung)` is derived, never stored). Rung +
      Magnitude band are per-artifact (row-level, 0.10); Assumption Type is
      per-assumption (looked up from the linked belief's assumption); only
      Result — hence the sign — is per belief.
    rung_anchor: "RUNG_ANCHOR[assumptionType][rung][band] — 3D per (assumption type × rung × band); see docs/evidence-ladder.md"
    range: [-99, 99]
  # the confidence-scoring simplification — graduation, risk group, cost tier
  risk_group:
    field: assumptions.Risk Group
    formula: >-
      Derived from the assumption's Assumption Type via TYPE_TO_GROUP. Each
      type maps to exactly one of Desirability / Usability / Feasibility /
      Viability. Never hand-set.
    range: [Desirability, Usability, Feasibility, Viability]
  cost_tier:
    field: assumptions.Cost to test
    formula: >-
      Derived from the assumption type's ceiling-rung nature: talk/desk →
      cheap; prototype/usability → moderate; sustained behaviour / money /
      operational → expensive. Overridable per assumption.
    range: [cheap, moderate, expensive]
  graduation_state:
    field: assumptions.Graduation
    formula: >-
      Untested = no effective evidence (no concluded readings with non-zero
      strength). Signal = some concluded confidence below the graduation bar.
      Graduated = confidence ≥ graduationBar(derivedImpact). Recomputed on
      every write; a disconfirming reading can move it backwards.
    range: [Untested, Signal, Graduated]

  completeness:
    field: assumptions.Completeness %
    formula: >-
      filled slots / all slots × 100, over six structural slots: Description,
      Lens, Impact, Scoring justification, dependencies traced (at least one
      Depends on / Enables link), Assumption Type. A derived readiness meter,
      never stored, recomputed on every touching write. 100 = Live-ready;
      below 100 = open work (the Draft ⇔ open-work invariant, replacing the
      retired Gaps machinery, assumption-guardrails.md §3). Impact = 0 still
      counts as a present slot (a real hand-scored value).
    range: [0, 100]

# ─────────────────────────────────────────────────────────────────────────────
# Entities — the record types and their properties. `hand_scored: true` marks
# the only numbers a human types. Body headings are verbatim names; the heading
# *level* is connector-specific (local files nest them one level under the
# record heading). `composed_into` marks a sub-structure realized inside its
# parent record backend-natively, not a register of its own. Owner / Agreed by
# are `dashboard_user` references (the auth team list), not free text and not a
# register. Every record carries backend-native `Created at` / `Last edited at`
# timestamps (the evidence-remodel slice) so the dashboard history has real times to show; they
# are not re-listed per entity.
# ─────────────────────────────────────────────────────────────────────────────
entities:
  assumptions:
    description: Every belief the business depends on, as a falsifiable sentence, scored by Confidence toward a graduation bar.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Description, type: text, required: true }
      - { name: Lens, type: select, options: vocabularies.lens, required: true }
      # @deprecated Stage (the confidence-scoring simplification) — retired. Kept for migration back-compat.
      - { name: Stage, type: select, options: vocabularies.stage }
      # Assumption Type (the confidence-scoring simplification) — the evidence key. Required: determines
      # which rungs are probative, the risk group, cost tier, and graduation.
      - { name: Assumption Type, type: select, options: vocabularies.assumption_type, required: true }
      # @deprecated Question Type (the confidence-scoring simplification) — retired, replaced by Assumption
      # Type. Kept for migration back-compat.
      - { name: Question Type, type: select, options: vocabularies.question_type }
      - { name: Theme, type: multi_select, options: vocabularies.theme }
      # The hand-scored seed (0–IMPACT_SEED_CAP, the confidence-scoring simplification). Capped so
      # structure supplies the rest via Derived Impact.
      - { name: Impact, type: number, range: [0, 60], hand_scored: true }
      - { name: Derived Impact, type: number, derived: derivations.derived_impact }
      # Risk — live dashboard ranking infrastructure (the confidence-scoring
      # simplification kept this, only the categorical Risk Group is new/separate).
      - { name: Risk, type: number, derived: derivations.risk }
      - { name: Confidence, type: number, derived: derivations.confidence }
      - { name: Completeness %, type: number, derived: derivations.completeness }
      # the confidence-scoring simplification — new derived fields
      - { name: Risk Group, type: select, options: vocabularies.risk_group, derived: derivations.risk_group }
      - { name: Cost to test, type: select, options: vocabularies.cost_tier, derived: derivations.cost_tier }
      - { name: Graduation, type: select, options: vocabularies.graduation_state, derived: derivations.graduation_state }
      - { name: Status, type: select, options: vocabularies.assumption_status,
          machine: status_machines.assumption_status }
      - { name: Owner, type: dashboard_user }
      # The one hand-typed rationale left on an assumption — narrowed to the
      # Impact-seed reason only (the evidence-remodel slice). The `5 Whys`, `Metric for truth`,
      # and `Gaps` fields were cut: the why-trace lives in Depends on / Enables,
      # falsifiability is enforced by the grill and the concrete threshold lives
      # on the experiment bar, and audit check-types are transient grill stages.
      - { name: Scoring justification, type: text }
    body_headings: []   # no body — the audit trail lives in dashboard history

  experiments:
    description: The unified evidence PLAN (the evidence-remodel slice — Testing and Market-grade both live here; the Goal record is gone). One row per designed test. Carries no rung and no strength — those live on the Readings the run produces. Bundles one-or-more beliefs through composed bar lines. A committed plan carries an optional Deadline and a closure Outcome (the commitment-grade behaviour a Goal used to give).
    properties:
      - { name: Title, type: title, required: true }
      - { name: Instrument, type: link, required: true }   # interview / dataset / analytics cohort / payment event
      - { name: Feasibility, type: select, options: vocabularies.feasibility }
      - { name: Status, type: select, options: vocabularies.experiment_status,
          machine: status_machines.experiment_status }
      - { name: Closure reason, type: select, options: vocabularies.experiment_closure_reason, required: false }
      - { name: Deadline, type: date, required: false }   # optional; the committed-plan deadline
      - { name: Outcome, type: select, options: vocabularies.experiment_outcome, required: false }  # null until Closed
      - { name: Owner, type: dashboard_user }
      - { name: Date, type: date }
      # The validation cycle (round) this run belongs to — a plain sequential
      # integer (Cycle 1, 2, 3…), null when unassigned. A scalar LABEL, not a
      # register and not a relation: it batches experiments into rounds so both
      # experiments and their tested assumptions filter by cycle. An
      # assumption's cycle membership is DERIVED (derived_views.cycle_membership)
      # from the experiments whose bar lines name it — never stored on the
      # assumption.
      - { name: Cycle, type: number, range: [1, null], required: false }
    body_headings: [Method protocol, Closure rollup]

  bar_line:
    description: >-
      The per-belief pre-registration on an Experiment — an
      association-with-attributes between one Experiment and one Assumption,
      written before any Reading exists. NOT a register: each bar line belongs
      to exactly one Experiment and is realized backend-natively (child table /
      embedded array / nested block; see connector guides). The closure
      bar verdict is a report, never a Confidence input.
    composed_into: experiments
    references: assumptions   # one assumption per bar line
    properties:
      - { name: We're right if, type: text, required: true }
      - { name: We're wrong if, type: text, required: false }   # no kill bar is legal
      - { name: Planned rung, type: select, options: vocabularies.rung }
      - { name: Bar verdict, type: select, options: vocabularies.bar_verdict, required: false }

  readings:
    description: One artifact scored per belief — the atomic unit Confidence reads. One artifact row carrying source identity + quality + RUNG once (rung is per-artifact, not per-belief — 0.10), a `body` on the canonical ## Quote / ## Source template (verbatim source text; analysis lives in beliefs[].Grading justification), plus an embedded beliefs[] array (entities.reading_belief) with one entry per assumption it bears on. One rung per artifact — a mixed-rung artifact is split into separate readings, one per rung (experiment-guardrails.md §0). Exists only once observed (no draft/running state). Origin (Experiment | none) lives on the row, never on the assumption; the Goal origin is gone (the evidence-remodel slice). EVIDENCE IS EXTERNAL — Source must be outside the team (customer/user/prospect/partner/third-party dataset/published source/observed market behaviour); internal meetings and team opinion are hypothesis/framing (→ assumption Scoring justification), never a reading, never a Confidence input (integrity internal-sourced-reading). An internal meeting that reports a verifiable external fact is second-hand evidence — attribute Source to the external event, set Rung to its rung, lower Credibility (experiment-guardrails.md §0).
    properties:
      - { name: Title, type: title, required: true }
      - { name: Source, type: link, required: true }   # the independence/dedupe key — the generator (person / dataset / cohort)
      - { name: Context links, type: multi_link, required: false }   # provenance (recording, dashboard, CRM row, user id); 0..N; drives no math
      - { name: Representativeness, type: select, options: vocabularies.source_quality.picks, required: true }   # source-level: one value per reading (grades the source, not the belief)
      - { name: Credibility, type: select, options: vocabularies.source_quality.picks, required: true }   # source-level: one value per reading
      - { name: Source quality, type: number, derived: true }   # = Representativeness × Credibility; scales each beliefs[] entry's weight
      - { name: Rung, type: select, options: vocabularies.rung, required: true }   # ROW-LEVEL (0.10): one rung per artifact; the anchor is per (assumption type × rung × band), see derivations.strength
      - { name: Magnitude band, type: select, options: vocabularies.magnitude_band, required: false }   # ROW-LEVEL; Market rungs only; null on Testing rungs
      - { name: Date, type: date }
      - { name: Owner, type: dashboard_user, required: false }
    body_headings: [Quote, Source]   # canonical reading body template: ## Quote (verbatim what the source said/did) + ## Source (who/when/link). Reintroduced as a deliberate reversal of the the evidence-remodel slice no-body slice. Analysis/reasoning does NOT go here — it lives in beliefs[].Grading justification.

  reading_belief:
    description: >-
      The per-belief scoring on a Reading — an association-with-attributes
      between one Reading and one Assumption, mirroring the Experiment's bar
      line. NOT a register: each entry belongs to exactly one Reading and is
      realized backend-natively (child table / embedded beliefs[] array /
      nested block keyed by belief; see connector guides). Result, Strength, and
      Grading justification are PER belief; the artifact's Rung + Magnitude band
      are per-ARTIFACT (on the reading row), read by each entry's Strength. A
      rich artifact bearing on N beliefs is one Reading with N of these entries,
      never N Readings (the evidence-remodel slice evidence remodel). The row's assumptionIds is
      the projection of these entries' assumption references.
    composed_into: readings
    references: assumptions   # one assumption per beliefs[] entry
    properties:
      - { name: Result, type: select, options: vocabularies.reading_result,
          machine: status_machines.reading_result, required: true }
      - { name: Strength, type: number, derived: derivations.strength }
      - { name: Grading justification, type: text }   # rationale for this entry's Result against the belief + how the reading's (row-level) rung/rep/cred bear on it (presence-checked, warn)

  decisions:
    description: The decision log. A row here IS a decision (the register is the discriminator — no Type field). No Kind field.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Statement, type: text }   # the one-line statement of what was decided (promoted from the body)
      - { name: Status, type: select, options: vocabularies.decision_status,
          machine: status_machines.decision_status }
      - { name: Area, type: select, options: vocabularies.area }
      - { name: Owner, type: dashboard_user }
      - { name: Agreed by, type: dashboard_user_multi }
      - { name: Unanimity score, type: number, range: [0, 100], hand_scored: true }
      - { name: Unanimity justification, type: text }   # why the score was scored as it was (promoted from the body)
      - { name: Source, type: text }
      - { name: Decided date, type: date }
      - { name: Reversibility, type: select, options: vocabularies.reversibility }
    body_headings: [Rationale, Alternatives considered]   # kept, terse; ## Decision and ## Source were promoted to fields / cut

  glossary:
    description: The shared glossary (the ubiquitous-language discipline; only the register is "Glossary"). No Type field; Status has no Reversed. All properties, no body (the evidence-remodel slice) — the terminology check parses structure directly.
    properties:
      - { name: Title, type: title, required: true }
      - { name: Status, type: select, options: vocabularies.glossary_status,
          machine: status_machines.glossary_status }
      - { name: Area, type: select, options: vocabularies.area }
      - { name: Definition, type: text }
      - { name: Avoid, type: structured, shape: "[{audience, phrase, fix}]" }   # per-audience banned phrasing + fix
      - { name: How it differs, type: text }   # confusable-neighbour distinctions
    body_headings: []

# ─────────────────────────────────────────────────────────────────────────────
# Relations — the edges between records. `kind: symmetric` means one relation
# set identically on both rows; `kind: directed` has a forward name and an
# inverse. On backends that don't auto-sync, both ends are written explicitly
# (integrity rule `two-way-relation-one-ended`). A Reading's `Source` is a
# link PROPERTY to an artifact home, not a register relation — the artifact is
# never a record (the reference-not-mirror rule: reference, never mirror).
# ─────────────────────────────────────────────────────────────────────────────
relations:
  - name: Depends on / Enables
    kind: directed
    forward: Depends on
    inverse: Enables
    source: assumptions
    target: assumptions
    cardinality: many-to-many
    meaning: The dependency DAG built by 5-Whys closure. Cycles are forbidden — A→…→A means the two nodes are the same assumption; merge.

  - name: Contradicts
    kind: symmetric
    source: assumptions
    target: assumptions
    cardinality: many-to-many
    meaning: Two distinct claims in tension that can't both hold. Pairs with the Contradiction gap and a provenance note naming the resolving experiment. Never for negation-duplicates — those merge (assumption-guardrails.md §4).

  - name: Assumption / Readings
    kind: directed
    forward: Assumption          # per beliefs[] entry (one assumption each); the row's assumptionIds is the projection
    inverse: Readings            # on the assumption row
    source: readings
    target: assumptions
    cardinality: many-to-many    # one reading scores N beliefs via beliefs[]; one belief has N readings
    realized_by: reading_belief  # composed beliefs[] entries + the assumptionIds projection
    meaning: >-
      The concluded readings — via their beliefs[] entries — scored against a
      belief: EVERY Confidence input, whatever the origin. A reading links one
      assumption per beliefs[] entry and may link several; dedupe is per
      (belief, source). Replaces the old Assumption / Experiments relation; the
      assumption never links an Experiment directly.

  - name: Reading / Experiment
    kind: directed
    forward: Experiment          # on the reading row, nullable
    inverse: Readings            # queried on the experiment, not stored
    source: readings
    target: experiments
    cardinality: many-to-one
    nullable: true
    meaning: The originating plan, as provenance. Null for bare/found readings. A reading has one origin type now — an Experiment or none; the Goal origin is gone (the evidence-remodel slice).

# The Experiment↔belief link is NOT a top-level relation: it is the composed
# `bar_line` sub-structure (entities.bar_line, references: assumptions), realized
# backend-natively inside each Experiment. "Which experiments test this belief"
# (derived_views.experiments_testing_me) reads those composed bar lines.

  - name: Related tension
    kind: symmetric
    source: decisions
    target: decisions
    cardinality: many-to-many
    meaning: "Decision↔Decision: unresolved contradiction — actionability inferred from each row's Status (decision-guardrails.md §4). Resolved via Supersedes."

  - name: Related tension
    kind: symmetric
    source: glossary
    target: glossary
    cardinality: many-to-many
    meaning: "Glossary↔Glossary: confusable-neighbour pairing (informational; pairs with the ## How it differs bullets)."

  - name: Supersedes / Superseded by
    kind: directed
    forward: Supersedes
    inverse: Superseded by
    source: decisions
    target: decisions
    cardinality: many-to-many
    meaning: Resolved, intentional override; the superseded row's Status flips to Superseded. Distinct from Related tension (unresolved) — never both for the same counterpart at once.

  - name: Based on assumption
    kind: directed
    forward: Based on assumption
    source: decisions
    target: assumptions
    cardinality: many-to-many
    side_effects: >-
      None — this edge never touches the assumption's Status, and it feeds
      Derived Impact only as a standing-decision node (+100 in S), never the
      seed.
    meaning: >-
      Why we decided this (decision-guardrails.md §6). Decision rows only.

  - name: Resolves assumption
    kind: directed
    forward: Resolves assumption
    source: decisions
    target: assumptions
    cardinality: many-to-many
    side_effects: >-
      Lowers the target's Impact to 0 (moot), gated and human-affirmed: a
      dated line in the assumption's Scoring justification field records the
      prior Impact and cites this decision; reversal restores it
      (decision-guardrails.md §8). Never touches Status — closure is reserved
      for true invalidation (docs/validated.md).
    meaning: This decision retires the open question without a test by making it moot — the paths it mattered on are foreclosed. Separate relation from Based on assumption — never inferred from it (decision-guardrails.md §6).

# ─────────────────────────────────────────────────────────────────────────────
# Status machines — every legal transition, who may perform it, and the gate.
# Anything not listed is an illegal write. Prose flow: registry-schema.md.
# ─────────────────────────────────────────────────────────────────────────────
status_machines:
  assumption_status:
    initial: Draft
    transitions:
      - { from: Draft, to: Live,
          by: "/assumptions (single|seed)", gate: gated,
          trigger: "grill close-out in a gated session: Completeness % reaches 100 (every structural slot present — Description, Lens, Impact, Scoring justification, dependencies traced, Assumption Type) and the grill's transient semantic findings are all resolved; the falsification bar (wrongIf, else Description) must be sharp enough that the inferred Assumption Type isn't flagged for review — a vague bar defaults to the permissive ProblemExists type (the gaming guard)" }
      - { from: Live, to: Draft,
          by: "/assumptions (gated session)", gate: gated,
          trigger: "the row falls below complete — a slot is emptied — or a grill finding (audit, contradiction, staleness) reopens it" }
      - { from: Live, to: Invalidated,
          by: "evidence skills + human verdict", gate: gated,
          trigger: "the evidence turns decisively against the belief — signed Confidence in the kill zone (≤ -50, reachable only by a series of missed Market-rung readings) — and a human affirms the kill" }
      - { from: Invalidated, to: Live,
          by: "gated reopen session", gate: gated,
          trigger: "the killing reading is re-judged flawed, or the world has changed enough that the kill no longer holds — human re-verdict" }
    forbidden:
      - There is no Validated status. Validation is only ever Confidence rising and Risk falling — "validated at <rung>" is prose, never a stored state (docs/validated.md).
      - Draft ⇔ open work, always (integrity rule draft-live-completeness-invariant): Completeness % < 100. A Live row is complete (100). The grill's transient semantic findings keep or return a row to Draft; batch/loop modes never flip Status directly.
      - Logging a Reading never flips Status (Confidence-only). Only a human-affirmed kill does.
      - Testing, queue membership, and mootness are derived views (derived_views:), never stored.

  experiment_status:
    initial: Draft
    transitions:
      - { from: Draft, to: Running,
          by: "/experiment-design commit", gate: gated,
          trigger: "the plan is committed — bars, instrument, and (for a committed/Market-grade plan) any Deadline fixed; the run begins collecting" }
      - { from: Running, to: Closed,
          by: "/find-evidence close-out or human conclusion", gate: gated,
          trigger: "the run ends — a Closure reason (Completed / Early-stop / Kill) is set, each bar line takes its Bar verdict, and (for a committed plan) the Outcome (Achieved/Missed/Dropped) is set" }
      - { from: [Draft, Running], to: Archived,
          by: "human retire action", gate: gated,
          trigger: "the plan is shelved without concluding — a Draft never committed, or a Running plan abandoned before it produced attributable evidence; it leaves the active + test-next views with no closure rollup. Re-point or bare any readings still attributed to it first (reading-orphaned-experiment)" }
      - { from: Archived, to: Draft,
          by: "human reopen", gate: gated,
          trigger: "a shelved plan is picked back up for redesign" }
    forbidden:
      - A Closed experiment is never reverted to Running.
      - Archived is a retire off-ramp, not a conclusion — a plan read back against its bars is Closed, never Archived; an Archived plan emits no evidence and takes no Bar verdict / Outcome.
      - The plan carries no rung and no strength — those are on the Readings it produced.
      - Outcome is null until Closed.
      - Evidence maturity (readings-in vs planned N) is derived, never stored, and never auto-concludes — concluding is a deliberate human act.

  reading_result:
    initial: "conclusive at logging (Validated | Invalidated | Inconclusive)"
    transitions: []   # set once at logging; a reading has no Running state
    forbidden:
      - No Running — a reading exists only once observed (registry-schema.md §Field map — Readings).
      - Strength must be 0 while Result is Inconclusive (integrity rule strength-not-gated).

  decision_status:
    initial: "Active (agreed) | Provisional (still forming)"
    transitions:
      - { from: Provisional, to: Active, by: "/decisions", gate: gated }
      - { from: [Active, Provisional], to: Superseded,
          by: "/decisions", gate: gated,
          trigger: "a later decision overrides it — always paired with a Supersedes edge" }
      - { from: [Active, Provisional], to: Reversed,
          by: "/decisions", gate: gated,
          trigger: "abandoned outright, no successor" }

  glossary_status:
    initial: "Active (agreed) | Provisional (still forming)"
    transitions:
      - { from: Provisional, to: Active, by: "/decisions", gate: gated }
      - { from: [Active, Provisional], to: Superseded,
          by: "/decisions", gate: gated,
          trigger: "a better term replaces it — flag-if-used thereafter" }
    forbidden:
      - No Reversed — a term is superseded by a better one, never reversed.

# ─────────────────────────────────────────────────────────────────────────────
# Derived views — assumption states read from data, never stored. Boards and
# filters may display them; no field carries them (registry-schema.md §Status
# & derived views). The working Risk threshold is a prioritisation setting,
# not a record property.
# ─────────────────────────────────────────────────────────────────────────────
derived_views:
  experiments_testing_me: >-
    The Experiments whose composed bar lines name this belief — read over the
    experiments' bar lines (each bar_line references one assumption), never a
    stored relation on the assumption. Feeds Testing and the test-next surface.
  evidence_maturity: >-
    Per experiment: readings-in vs the planned N across its bar lines — a
    derived progress meter, never stored, never auto-concluding. Surfaced as
    "planned N met — ready to conclude?" but always waits for a human act
    (the evidence-remodel slice).
  cycle_membership: >-
    The validation cycle(s) a belief is being tested in — the set of `Cycle`
    values of the (non-archived) Experiments whose bar lines name it. Derived
    from the experiments, never stored on the assumption (mirrors
    experiments_testing_me). A belief tested by no cycle-tagged experiment has
    no cycle. Lets the dashboard filter/group both experiments (by their own
    `Cycle`) and assumptions (by this derived set) by round.
  testing: "Status = Live AND a linked Experiment (plan) has Status = Running with an open bar line on this belief."
  test_next_surface: >-
    Experiments, not assumptions — there is no Risk-ranked belief queue.
    Candidate/designed (Draft) experiments on Live rows, ranked by Feasibility ×
    the linked assumption's Risk; tie-break = most-negative linked signed
    Confidence first. Every Live row is eligible on its own merits, linked or
    not. The exact ruleset and top-N cut are the experiment-prioritisation
    layer's.
  kill_lane: >-
    Status = Live AND Confidence ≤ -50 — surfaced for a human kill verdict
    (integrity rule kill-zone-unreviewed), out of the test-next surface.
  next_move: >-
    The dashboard front door's "what's my next move" ranking (the next-move action vocabulary Model A;
    implemented once in packages/core derivation.rankNextMoves, computed fresh on
    read — a whole-set ordering, never stored, so it stays out of the on-write
    recompute). Ranks BELIEFS (not experiments — this is the belief-facing
    counterpart to test_next_surface, which ranks the experiments that test
    them): each unresolved assumption (not moot, Status ≠ Invalidated) is scored
    Feasibility × Risk — Feasibility = the cheapest (highest) among the
    experiments whose bar lines name it, or a neutral middle when none plans it
    yet; tie-break = most-negative Confidence first, then id. A belief at
    Confidence ≤ -50 (kill_lane) jumps ABOVE the Feasibility × Risk order
    regardless of rank, ordered among the lane by Risk — the one place act
    urgency beats belief risk. Each ranked belief also carries the single ACT its
    stage demands (the move): Impact unscored → score impact; scored but no
    evidence and no running test → design an experiment; a test running, no
    evidence in → record a reading; evidence in, no standing decision resting on
    it → decide; kill lane → re-test / kill. A belief with evidence and a
    standing (Active/Provisional) decision on it is resolved and drops out. The
    front door names all acts but only score-impact / decide / re-test are human
    step-in forms (the step-in human action set); the rest are agent-run / visualised.
  proven_set: >-
    Status = Live AND the strongest (largest |Strength|) concluded linked
    Reading is Validated — "what we currently know"; provisional, always
    (docs/validated.md).
  moot: >-
    Seed Impact = 0 via a standing decision's Resolves assumption action —
    Derived Impact pins to 0, drops out of every ranking; reversal restores
    the prior Impact.
  # Derived facets (the evidence-remodel slice) — display-only, NEVER stored. No field carries
  # them and no rule forks on them; they exist so the dashboard can label a
  # reading/experiment without the operator setting the same fact twice. The
  # display computation itself is the dashboard layer's (Spec B / the redesigned-surfaces wiring).
  quant_qual: >-
    A reading entry's quant-vs-qual character, inferred from its beliefs[]
    entry's Rung + instrument (a system-number instrument at any rung reads
    "quant"; recruited-sample testing rungs read "qual"). A derived display
    tag, never a stored flag.
  commercial_consumer: >-
    An experiment's commercial-vs-consumer character, read through from the
    tested assumption's Lens / Theme — never set on the experiment, so the
    fact lives in exactly one place.

# ─────────────────────────────────────────────────────────────────────────────
# Integrity rules — derivable defects no single-record grill can see. Each is
# a named check: audits detect (read-only), fixes stay gated. `surfaced_by`
# names the workflow that owns detection. severity: error = always a finding;
# warn = flag for human judgment.
# ─────────────────────────────────────────────────────────────────────────────
integrity_rules:
  # Structural (any register)
  - id: dangling-reference
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A relation value resolves to no record.
  - id: illegal-select-value
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit", validate_backend]
    check: A select field carries a value not in its vocabulary (fixed lists above; config lists for Lens/Area).
  - id: body-template-missing-heading
    severity: warn
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A record is missing one of its type's verbatim body_headings. Experiments (## Method protocol / ## Closure rollup), Decisions (## Rationale / ## Alternatives considered), and Readings (## Quote / ## Source — the canonical reading body template, verbatim source text; reintroduced as a deliberate reversal of the the evidence-remodel slice no-body slice) carry heading-structured bodies; assumptions and glossary have no body (the evidence-remodel slice). A Decision missing "## Rationale", or a Reading missing "## Quote"/"## Source", silently escapes checks — always flag it. Reading analysis/reasoning belongs in beliefs[].Grading justification, never the body.
  - id: two-way-relation-one-ended
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: A symmetric or inverse relation written on one end only, on a backend that doesn't auto-sync.

  # Derived-field discipline
  - id: derived-field-stale
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: >-
      Stored Confidence/Risk/Derived Impact (assumptions) or Strength/Source
      quality (readings — Strength per beliefs[] entry, Source quality on the
      row) differs from recomputing its derivation (formula-less backends). All
      four assumption derivations are recomputed on every touching write
      (the derive-on-write invariant), so a mismatch is a real defect — no field is stale by design.
      A Derived Impact below its seed or > 100 is always a finding.
  - id: strength-not-gated
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: A beliefs[] entry's Strength ≠ 0 while that entry's Result is Inconclusive.
  - id: reading-ungraded
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      A concluded Validated/Invalidated beliefs[] entry whose Grading
      justification field is empty — it should carry the entry's rung + (Market
      rungs) magnitude anchor + the reading's Representativeness × Credibility
      rationale (experiment-guardrails.md §2). An ungraded entry's weight can't
      be audited.
  - id: market-rung-no-floor
    severity: error
    surfaced_by: ["/assumptions audit", "/find-evidence audit"]
    check: >-
      A Market-rung (Commitment / Payment) beliefs[] entry concluded
      Invalidated whose originating Experiment bar has no pre-registered We're
      wrong if bar — no floor, no negative: an uncontrolled absence of the
      outcome is Inconclusive (experiment-guardrails.md §2).
  - id: reading-orphaned-experiment
    severity: error
    surfaced_by: ["/assumptions audit", "/find-evidence audit"]
    check: >-
      A Reading whose experimentId is set but resolves to no experiment, or to
      an Archived one — a reading's origin must reference a live (non-archived)
      Experiment (experiment-guardrails.md §6). Re-point it, or bare the reading
      (null the experimentId), which also drops its commitmentFactor to 0.85.
  - id: internal-sourced-reading
    severity: warn
    surfaced_by: ["/assumptions audit", "/find-evidence audit"]
    check: >-
      A Reading whose Source looks INTERNAL to the team rather than external —
      a best-effort heuristic on Source/body: internal-meeting or team-opinion
      markers (e.g. "board meeting", "standup", "strategy/planning session",
      "our call", "team thinks", "we believe", a source that is a teammate/
      founder rather than a customer/user/prospect/partner/dataset/published
      source). EVIDENCE IS EXTERNAL (experiment-guardrails.md §0): flag for a
      human to either (a) move it to the assumption's Scoring justification as
      rationale and delete the reading (pure internal opinion — never a
      Confidence input), or (b) if the meeting relayed a real external fact,
      re-attribute Source to that external event, grade on its rung, and lower
      Credibility (second-hand). A heuristic flag, not a hard block.
  - id: stale-representativeness
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      The ICP/Lens definition changed after a Reading's Representativeness
      was graded — the stored Source quality reads a retired ICP and the
      recompute silently uses it. Flag every reading graded under the old
      definition for re-grade (experiment-guardrails.md §2).

  # Graph health (assumptions)
  - id: dependency-cycle
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: A Depends on cycle (A→…→A) — the nodes are the same assumption; merge (assumption-guardrails.md §2).
  - id: orphan-assumption
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: No Depends on and no Enables — does this connect to the thesis at all? (assumption-guardrails.md §5)
  - id: contradiction-unwired
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: A Contradicts edge whose two rows have no resolving experiment bar-line or decision naming the tension — a marked contradiction nobody is testing or has settled (assumption-guardrails.md §4).
  - id: direct-contradiction-unmerged
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: Two records asserting opposite truth values of the same proposition — a negation-duplicate; merge (assumption-guardrails.md §4a).

  # @deprecated Stage membership. Stage was retired (the confidence-scoring
  # simplification); this rule only fires against legacy rows still carrying
  # a stored Stage value from before the migration. Kept for migration
  # back-compat only — do not extend it, and drop it once no row carries Stage.
  - id: stage-actor-consistency
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      A legacy row's Stage value is inconsistent with its subject's expected
      actor. The membership test was the subject-verb rule: every
      assumption's subject must be an external actor (user, buyer,
      competitor, regulator, partner, distributor, investor) or the market,
      never "we". A Stage-4 (Maturity) record whose subject is "we" is
      suspect; a Stage-1 (Discovery) record framed as a build capability is
      suspect. Flag for human re-framing during migration — a mis-staged
      record usually means the claim was a BUILD risk in disguise, not a
      wrong tag.

  # Status coherence (assumptions × readings)
  - id: draft-live-completeness-invariant
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: >-
      Status = Live with Completeness % < 100, or Status = Draft at Completeness
      % = 100 with no open grill finding — the Draft ⇔ open-work invariant is
      broken (the evidence-remodel slice, replacing the retired Gaps invariant). A Live row is
      structurally complete; a Draft has open work (an incomplete slot or an
      unresolved grill finding). Fix in a gated session.
  - id: incomplete-live
    severity: error
    surfaced_by: ["/assumptions audit", validate_backend]
    check: >-
      A Live assumption at Completeness % < 100 — a missing structural slot
      (Description, Lens, Impact, Scoring justification, dependencies traced,
      Assumption Type). The write model blocks a Draft→Live promotion below 100
      (write-time enforcement lands with the CRUD write slice, the CRUD write slice); the
      audit confirms it meanwhile. A Draft may legally sit below 100.
  - id: unrolled-verdict
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: A concluded Invalidated beliefs[] entry was never folded into the linked assumption's stored Confidence (the score predates the verdict) — the miss was never rolled up; recompute, and if the result lands in the kill zone, flag for a gated close-out (human verdict).
  - id: moot-without-resolver
    severity: error
    surfaced_by: ["/assumptions audit", "/decisions audit"]
    check: Impact = 0 with a mootness line citing a resolving decision that is no longer standing (Reversed/Superseded, successor doesn't re-resolve) — restore the prior Impact per decision-guardrails.md §8.

  # Propagation (cross-register — a verdict in one place invalidates state in another)
  - id: invalidated-dependency
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: An assumption whose Depends on target is Invalidated while it is itself Live with high Confidence — its support rests on a broken foundation; flag for a gated reopen/review.
  - id: contradicts-both-validated
    severity: error
    surfaced_by: ["/assumptions audit"]
    check: Both ends of a Contradicts edge sit at solidly positive Confidence (strongest concluded Reading Validated on each) — the tension the edge marks was never real, or one verdict is wrong.
  - id: stale-rationale
    severity: warn                # error when the decision is a One-way door
    surfaced_by: ["/decisions audit"]
    check: A standing (Active) decision whose Based on assumption link points at a now-Invalidated assumption — the rationale is stale; re-affirm or revisit.
  - id: stale-resolution
    severity: error
    surfaced_by: ["/decisions audit"]
    check: A Reversed/Superseded decision whose Resolves assumption targets still sit moot at Impact 0 (and the successor doesn't re-resolve them) — decision-guardrails.md §8.
  - id: one-way-door-untested-basis
    severity: error
    surfaced_by: ["/decisions audit"]
    check: A One-way door decision Based on an assumption whose Risk sits above the working threshold, with no risk-acceptance line in ## Rationale — decision-guardrails.md §8.
  - id: unresolved-tension
    severity: warn
    surfaced_by: ["/decisions audit"]
    check: A Decision↔Decision Related tension pair with both sides still Active — a human must resolve or confirm coexistence (decision-guardrails.md §4).
  - id: supersedes-tension-overlap
    severity: error
    surfaced_by: ["/decisions audit"]
    check: The same counterpart wired in both Related tension and Supersedes — once Supersedes is set, the tension is resolved (decision-guardrails.md §5).

  # Committed (Market-grade) experiments — the commitment discipline the Goal
  # record used to carry, re-homed onto the unified Experiment (the evidence-remodel slice). These
  # surface or chase; none blocks a human from committing.
  - id: overdue-risk-acceptance
    severity: error
    surfaced_by: ["/find-evidence audit"]
    check: A Running experiment with a risk-acceptance line past its "revisit by" date whose belief is still untested (format — decision-guardrails.md §8).
  - id: experiment-band-unaccepted
    severity: warn
    surfaced_by: ["/find-evidence audit"]
    check: A committed (Deadline-bearing) experiment testing a belief whose Confidence sits below the ready band, with no dated risk-acceptance line naming it — the gamble was taken without being written down. Advisory at draft time, chased once Running.
  - id: experiment-tripwire-unreviewed
    severity: warn
    surfaced_by: ["/find-evidence audit"]
    check: A Draft/Running committed experiment resting on a belief that took a conclusive verdict after the plan was drafted, with no subsequent re-cut, risk-acceptance, or affirmation — the mid-cycle tripwire fired and nobody answered it.
  - id: overdue-experiment
    severity: warn
    surfaced_by: ["/find-evidence audit"]
    check: A Running experiment past its Deadline that has not been Closed.
  - id: outcome-unread
    severity: error
    surfaced_by: ["/find-evidence audit"]
    check: An experiment Closed as Achieved/Missed whose outcome was never decomposed — no beliefs[] entry (on any reading linking this experiment) against any belief it bars. The outcome IS the evidence; closing without reading it back is the one thing the two-level model exists to prevent. Dropped is exempt, emitting no evidence.
  - id: stale-seed-anchor
    severity: warn
    surfaced_by: ["/assumptions audit"]
    check: >-
      An assumption whose hand-scored seed justification leans on a decision or
      commitment ("scored high because the Q3 plan rests on it") — the seed
      must be purely intrinsic. A standing decision's weight is the
      propagation's job (S) and dies with the link; a plan never touches
      Impact at all (assumption-guardrails.md §3). Re-justify the seed on
      severity alone. (Derived Impact needs no staleness check: a dead
      decision link's push vanishes at the next recompute.)
